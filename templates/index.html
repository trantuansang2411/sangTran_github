<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiBot | AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">✨</span>
                    <h2>OptiBot</h2>
                </div>
            </div>
            
            <div class="sidebar-content">
                <div class="nav-item active">
                    <span class="icon">💬</span> Chat
                </div>
                <div class="nav-item">
                    <span class="icon">📚</span> Knowledge Base
                </div>
                <div class="nav-item">
                    <span class="icon">⚙️</span> Settings
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="status-badge">
                    <span class="dot"></span> Online
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <div class="header-info">
                    <h1>Support Assistant</h1>
                    <p>Powered by RAG & Gemini AI</p>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" title="Clear Chat" onclick="clearChat()">🗑️</button>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <!-- Welcome Message -->
                <div class="message bot-message">
                    <div class="avatar bot-avatar">🤖</div>
                    <div class="message-content">
                        Hello! I am OptiBot, your AI support assistant. I can answer any questions based on our OptiSigns support articles. How can I help you today?
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <form id="chat-form" class="chat-form">
                    <input type="text" id="user-input" placeholder="Ask a question... (e.g., 'How do I add a YouTube video?')" autocomplete="off" required>
                    <button type="submit" id="send-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
