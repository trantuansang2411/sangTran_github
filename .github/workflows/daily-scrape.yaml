name: Daily Scrape & Upload

on:
  schedule:
    - cron: '0 0 * * *'  # Moi ngay luc 00:00 UTC (7:00 SA gio Viet Nam)
  workflow_dispatch:  # Cho phep chay manual tren GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Can quyen nay de commit file hash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scraper & upload delta to Gemini
        run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Save hash & upload cache back to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add article_hashes.json uploaded_files.json
          git diff --cached --quiet || git commit -m "chore: update article hashes $(date -u +%Y-%m-%d)"
          git push