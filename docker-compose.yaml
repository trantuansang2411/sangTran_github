# docker-compose.yaml
# Chay ca Qdrant + OptiBot chi bang 1 lenh: docker compose up

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  optibot:
    build: .
    depends_on:
      - qdrant
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./:/app

volumes:
  qdrant_data:
